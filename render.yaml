# Render blueprint for the MemOps backend (FastAPI + Cognee).
# The repo root IS the MemOps project, so build/start commands run from here.
#
# Secrets (sync: false) are NOT stored in git — Render prompts for them in the
# dashboard when you create the service from this blueprint. Fill in:
#   LLM_API_KEY      = your Groq API key (sk-... / gsk_...)
#   HF_TOKEN         = your HuggingFace access token (hf_...). REQUIRED — the
#                      graph is embedded via HF's hosted inference API, so
#                      without it seeding fails.
#   ALLOWED_ORIGINS  = your Vercel frontend URL once it exists
#                      (e.g. https://memops.vercel.app). Leave blank at first;
#                      an unset value falls back to allowing any origin so the
#                      deploy works before the frontend is live.
services:
  - type: web
    name: memops-api
    runtime: python
    plan: free
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: custom
      - key: LLM_MODEL
        value: openai/llama-3.3-70b-versatile
      - key: LLM_ENDPOINT
        value: https://api.groq.com/openai/v1
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: EMBEDDING_MODEL
        value: huggingface/sentence-transformers/all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSIONS
        value: "384"
      - key: HF_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
